name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: ./backend/package.json
      - name: Install dependencies
        run: npm ci || npm install
      - name: Syntax check
        run: node -c server.js
      - name: Run tests
        run: npm test
      - name: Security check
        run: npm run audit:prod

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: ./frontend/package.json
      - name: Install dependencies
        run: npm ci || npm install
      - name: Run linter
        run: npm run lint
      - name: Build
        run: npm run build
      - name: Security check
        run: npm run audit:prod

  admin:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./admin
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: ./admin/package.json
      - name: Install dependencies
        run: npm ci || npm install
      - name: Run linter
        run: npm run lint
      - name: Build
        run: npm run build
      - name: Security check
        run: npm run audit:prod
